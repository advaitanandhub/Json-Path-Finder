<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JSON Path Finder</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --accent: #f0f0f0;
      --box-bg: #fafafa;
      --border: #ccc;
    }

    [data-theme="dark"] {
      --bg: #1e1e1e;
      --text: #f0f0f0;
      --accent: #2a2a2a;
      --box-bg: #1b1b1b;
      --border: #444;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--accent);
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
    }

    #title {
      font-weight: 600;
      font-size: 20px;
    }

    #top-controls button {
      margin-left: 10px;
      padding: 6px 10px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text);
      font-size: 16px;
    }

    #main {
      flex: 1;
      display: flex;
      padding: 10px;
      gap: 10px;
      box-sizing: border-box;
    }

    .box {
      flex: 1;
      background: var(--box-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #input-box {
      position: relative;
    }

    #input-controls {
      position: absolute;
      top: 8px;
      right: 10px;
      z-index: 10;
    }

    #input-controls button {
      margin-left: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--accent);
      color: var(--text);
      border-radius: 4px;
    }

    #input-box textarea {
      width: 100%;
      height: 100%;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
      border: none;
      background: var(--bg);
      color: var(--text);
      resize: none;
    }

    #output-header {
      padding: 10px;
      background: var(--accent);
      border-bottom: 1px solid var(--border);
    }

    .path-wrapper {
      display: flex;
      align-items: center;
      width: 100%;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      font-family: monospace;
    }

    [data-theme="dark"] .path-wrapper {
      background: var(--box-bg);
    }

    .path-label {
      background: var(--accent);
      padding: 8px 12px;
      font-weight: 600;
      white-space: nowrap;
      border-right: 1px solid var(--border);
    }

    .path-value {
      flex: 1;
      padding: 8px 12px;
      overflow-x: auto;
      white-space: nowrap;
      color: var(--text);
    }

    .path-copy {
      background: none;
      border-left: 1px solid var(--border);
      padding: 8px 12px;
      cursor: pointer;
      color: gray;
      font-size: 14px;
      border: none;
    }

    .copy-feedback {
      margin-left: 8px;
      color: green;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    .copy-feedback.show {
      opacity: 1;
    }

    #output-box .tree-container {
      flex: 1;
      overflow: auto;
      padding: 10px 20px;
      font-family: monospace;
      font-size: 14px;
    }

    ul.tree {
      list-style: none;
      padding-left: 20px;
      position: relative;
    }

    ul.tree::before {
      content: '';
      position: absolute;
      top: 0;
      left: 8px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    li.node {
      margin: 4px 0;
      padding-left: 12px;
      position: relative;
      cursor: pointer;
    }

    li.node::before {
      content: '';
      position: absolute;
      top: 12px;
      left: -12px;
      width: 12px;
      height: 1px;
      background: var(--border);
    }

    li.node:hover {
      background: rgba(100, 100, 255, 0.1);
    }
  </style>
</head>
<body data-theme="light">
  <div id="top-bar">
    <div id="title">JSON Path Finder</div>
    <div id="top-controls">
      <button onclick="toggleTheme()" id="theme-icon">🌙</button>
    </div>
  </div>

  <div id="main">
    <div class="box" id="input-box">
      <div id="input-controls">
        <button onclick="beautify()">Beautify</button>
        <button onclick="minify()">Minify</button>
      </div>
      <textarea id="input-json">{ "customer": { "name": "Alice", "location": { "city": "NY", "zip": "10001" } } }</textarea>
    </div>

    <div class="box" id="output-box">
      <div id="output-header">
        <div class="path-wrapper">
          <div class="path-label">Path:</div>
          <div class="path-value" id="json-path">Click any key</div>
          <button class="path-copy" onclick="copyPath()">Copy</button>
          <span class="copy-feedback" id="copy-feedback">✔ Copied!</span>
        </div>
      </div>
      <div class="tree-container" id="tree-container"></div>
    </div>
  </div>

  <script>
    const inputEl = document.getElementById('input-json');
    const pathEl = document.getElementById('json-path');
    const treeContainer = document.getElementById('tree-container');
    let currentPath = '';

    inputEl.addEventListener('input', renderTree);

    function beautify() {
      try {
        inputEl.value = JSON.stringify(JSON.parse(inputEl.value), null, 2);
        renderTree();
      } catch {}
    }

    function minify() {
      try {
        inputEl.value = JSON.stringify(JSON.parse(inputEl.value));
        renderTree();
      } catch {}
    }

    function toggleTheme() {
      const body = document.body;
      const isDark = body.getAttribute("data-theme") === "dark";
      body.setAttribute("data-theme", isDark ? "light" : "dark");
      document.getElementById("theme-icon").textContent = isDark ? "🌙" : "☀️";
    }

    function copyPath() {
      if (!currentPath) return;
      navigator.clipboard.writeText(currentPath);
      const feedback = document.getElementById('copy-feedback');
      feedback.classList.add('show');
      setTimeout(() => feedback.classList.remove('show'), 1500);
    }

    function renderTree() {
      treeContainer.innerHTML = '';
      pathEl.textContent = 'Click any key';
      currentPath = '';

      try {
        const json = JSON.parse(inputEl.value);
        const tree = buildTree(json, '');
        tree.classList.add('tree');
        treeContainer.appendChild(tree);
      } catch {
        treeContainer.innerHTML = '<div style="color:red;">⚠️ Invalid JSON</div>';
      }
    }

    function buildTree(obj, path) {
      const ul = document.createElement('ul');

      for (let key in obj) {
        const newPath = path ? `${path}.${key}` : key;
        const li = document.createElement('li');
        li.className = 'node';
        li.textContent = key;

        li.addEventListener('click', (e) => {
          e.stopPropagation();
          currentPath = newPath;
          pathEl.textContent = currentPath;
        });

        if (typeof obj[key] === 'object' && obj[key] !== null) {
          li.appendChild(buildTree(obj[key], newPath));
        }

        ul.appendChild(li);
      }

      return ul;
    }

    renderTree();
  </script>
</body>
</html>
